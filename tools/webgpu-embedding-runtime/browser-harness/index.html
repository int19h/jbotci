<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>jbotci F2LLM WebGPU Harness</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.45;
      }

      body {
        margin: 0;
        background: Canvas;
        color: CanvasText;
      }

      main {
        box-sizing: border-box;
        width: min(1200px, 100%);
        margin: 0 auto;
        padding: 20px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 1.5rem;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 1rem;
      }

      section {
        border-top: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        padding: 16px 0;
      }

      label {
        display: grid;
        gap: 4px;
        font-size: 0.875rem;
        font-weight: 650;
      }

      input,
      textarea,
      select,
      button {
        box-sizing: border-box;
        width: 100%;
        font: inherit;
      }

      input,
      textarea,
      select {
        border: 1px solid color-mix(in srgb, CanvasText 28%, transparent);
        border-radius: 6px;
        padding: 8px 10px;
        background: Canvas;
        color: CanvasText;
      }

      textarea {
        min-height: 72px;
        resize: vertical;
      }

      button {
        min-height: 36px;
        border: 1px solid color-mix(in srgb, CanvasText 30%, transparent);
        border-radius: 6px;
        padding: 7px 10px;
        background: color-mix(in srgb, CanvasText 8%, Canvas);
        color: CanvasText;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 12px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 8px;
      }

      .status {
        margin-top: 12px;
        padding: 10px;
        border-radius: 6px;
        background: color-mix(in srgb, CanvasText 7%, Canvas);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.875rem;
        white-space: pre-wrap;
      }

      .meta {
        margin: -8px 0 16px;
        color: color-mix(in srgb, CanvasText 70%, transparent);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.8125rem;
      }

      pre {
        overflow: auto;
        min-height: 360px;
        max-height: 58vh;
        margin: 0;
        border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        border-radius: 6px;
        padding: 12px;
        background: color-mix(in srgb, CanvasText 5%, Canvas);
        font-size: 0.8125rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>F2LLM WebGPU Harness</h1>
      <div class="meta">Harness build: runtime-onnx-q4-rope-dispatch-2026-06-05-1</div>

      <section>
        <h2>Inputs</h2>
        <div class="grid">
          <label>
            Runtime module URL
            <input id="runtime-url" autocomplete="off">
          </label>
          <label>
            Model artifact base URL
            <input id="artifact-url" autocomplete="off">
          </label>
          <label>
            Vector catalog base URL
            <input id="vectors-url" autocomplete="off">
          </label>
          <label>
            Corpus
            <select id="corpus-id">
              <option value="vlacku-en">vlacku-en</option>
              <option value="cukta-cll">cukta-cll</option>
            </select>
          </label>
          <label>
            Repeat count
            <input id="repeat-count" type="number" min="1" max="50" value="3">
          </label>
          <label>
            Golden embedding JSON URL
            <input id="expected-url" autocomplete="off">
          </label>
          <label>
            ORT Web module URL
            <input id="ort-url" autocomplete="off">
          </label>
          <label>
            ORT WASM directory URL
            <input id="ort-wasm-url" autocomplete="off">
          </label>
          <label>
            ONNX reference model URL
            <input id="onnx-url" autocomplete="off">
          </label>
          <label>
            q4 ONNX model URL
            <input id="onnx-q4-url" autocomplete="off">
          </label>
        </div>
        <label style="margin-top: 12px;">
          Query
          <textarea id="query">coi ro do</textarea>
        </label>
      </section>

      <section>
        <h2>Actions</h2>
        <div class="buttons">
          <button id="env">Log Environment</button>
          <button id="load">Load Runtime</button>
          <button id="embed">Embed Query</button>
          <button id="goldens">Run Golden Set</button>
          <button id="onnx">Run ONNX References</button>
          <button id="onnx-goldens">Run ONNX Golden Set</button>
          <button id="pack">Load Vector Pack</button>
          <button id="search">Search</button>
          <button id="repeat">Repeat Embed</button>
          <button id="run-all">Run All</button>
          <button id="copy">Copy Log JSON</button>
          <button id="download">Download Log JSON</button>
          <button id="clear">Clear Log</button>
        </div>
        <div id="status" class="status">Idle.</div>
      </section>

      <section>
        <h2>Log</h2>
        <pre id="log" aria-live="polite"></pre>
      </section>
    </main>
    <script type="module" src="./harness.js?v=runtime-onnx-q4-rope-dispatch-2026-06-05-1"></script>
  </body>
</html>
