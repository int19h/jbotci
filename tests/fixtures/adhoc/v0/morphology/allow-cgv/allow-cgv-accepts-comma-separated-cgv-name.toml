id = "adhoc.v0.morphology.allow-cgv.allow-cgv-accepts-comma-separated-cgv-name"
lojban = "la .si,atl."
dialect = "(allow-cgv)"
tags = ["v0-adhoc", "morphology"]

[expectations.morphology]
status = "success"
raw = '[WordLike(Bare(Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "la" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 0, byte_end: 2, char_start: 0, char_end: 2, start: None, end: None }) }))), WordLike(Bare(Word(Cmevla { phonemes: Phonemes(PhonemesData { text: "sĭatl" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 4, byte_end: 10, char_start: 4, char_end: 10, start: None, end: None }) })))]'

[expectations.output.vlasei]
brackets = "(la .sĭatl.)"
tree = """
[
  Cmavo @[0‥2) "la",
  Cmevla @[4‥10) "sĭatl",
]"""
json = '[{"Bare":{"Cmavo":{"phonemes":"la","span":[0,2]}}},{"Bare":{"Cmevla":{"phonemes":"sĭatl","span":[4,10]}}}]'
