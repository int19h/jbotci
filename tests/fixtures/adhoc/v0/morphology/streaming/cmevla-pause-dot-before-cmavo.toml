id = "adhoc.v0.morphology.streaming.cmevla-pause-dot-before-cmavo"
lojban = ".alis.mi"
tags = ["v0-adhoc", "morphology", "streaming-morphology"]

[expectations.morphology]
status = "success"
raw = '[PlainWord(Cmevla { phonemes: Phonemes { text: "alis" }, span: SourceSpan { source_id: Some(SourceId("<fixture>")), byte_start: 1, byte_end: 5, char_start: 1, char_end: 5, start: None, end: None } }), PlainWord(Cmavo { phonemes: Phonemes { text: "mi" }, span: SourceSpan { source_id: Some(SourceId("<fixture>")), byte_start: 6, byte_end: 8, char_start: 6, char_end: 8, start: None, end: None } })]'

[expectations.output.vlasei]
brackets = "(.alis. mi)"
tree = """
[
  Cmevla @[1‥5) "alis",
  Cmavo @[6‥8) "mi",
]"""
json = '[{"PlainWord":{"Cmevla":{"phonemes":"alis","span":[1,5]}}},{"PlainWord":{"Cmavo":{"phonemes":"mi","span":[6,8]}}}]'
