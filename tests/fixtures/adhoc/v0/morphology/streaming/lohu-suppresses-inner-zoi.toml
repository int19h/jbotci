tree = """
[
  LohuQuote @[0‥25) {
    lohu: Cmavo @[0‥4) "lo'u",
    Cmavo @[5‥8) "zoĭ",
    Cmavo @[9‥11) "gy",
    Gismu @[12‥17) "bróda",
    Cmavo @[18‥20) "gy",
    lehu: Cmavo @[21‥25) "le'u",
  },
]"""
json = """[{"LohuQuote":{"lohu":{"Cmavo":{"phonemes":"lo'u","span":[0,4]}},"quoted_words":[{"Cmavo":{"phonemes":"zoĭ","span":[5,8]}},{"Cmavo":{"phonemes":"gy","span":[9,11]}},{"Gismu":{"phonemes":"bróda","span":[12,17]}},{"Cmavo":{"phonemes":"gy","span":[18,20]}}],"lehu":{"Cmavo":{"phonemes":"le'u","span":[21,25]}}}}]"""
