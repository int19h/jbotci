id = "adhoc.v0.morphology.basic.lohu-protects-si"
lojban = "lo'u mi si le'u"
tags = ["v0-adhoc", "morphology"]

[expectations.morphology]
status = "success"
raw = """[WordLike(LohuQuote { lohu: Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "lo'u" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 0, byte_end: 4, char_start: 0, char_end: 4, start: None, end: None }) }), quoted_words: [Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "mi" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 5, byte_end: 7, char_start: 5, char_end: 7, start: None, end: None }) }), Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "si" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 8, byte_end: 10, char_start: 8, char_end: 10, start: None, end: None }) })], lehu: Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "le'u" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 11, byte_end: 15, char_start: 11, char_end: 15, start: None, end: None }) }) })]"""

