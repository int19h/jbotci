    Cmavo @[8‥10) "si",
    lehu: Cmavo @[11‥15) "le'u",
  },
]"""
json = """[{"LohuQuote":{"lohu":{"Cmavo":{"phonemes":"lo'u","span":[0,4]}},"quoted_words":[{"Cmavo":{"phonemes":"mi","span":[5,7]}},{"Cmavo":{"phonemes":"si","span":[8,10]}}],"lehu":{"Cmavo":{"phonemes":"le'u","span":[11,15]}}}}]"""
