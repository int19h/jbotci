id = "adhoc.v0.morphology.basic.leading-indicator-chain-nai"
lojban = "a'anai a'enai"
tags = ["v0-adhoc", "morphology"]

[expectations.morphology]
status = "success"
raw = """[WordLike(Bare(Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "a'a" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 0, byte_end: 3, char_start: 0, char_end: 3, start: None, end: None }) }))), WordLike(Bare(Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "naĭ" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 3, byte_end: 6, char_start: 3, char_end: 6, start: None, end: None }) }))), WordLike(Bare(Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "a'e" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 7, byte_end: 10, char_start: 7, char_end: 10, start: None, end: None }) }))), WordLike(Bare(Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "naĭ" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 10, byte_end: 13, char_start: 10, char_end: 13, start: None, end: None }) })))]"""

[expectations.output.vlasei]
brackets = "(.a'a naĭ .a'e naĭ)"
tree = """
[
  Cmavo @[0‥3) "a'a",
  Cmavo @[3‥6) "naĭ",
  Cmavo @[7‥10) "a'e",
  Cmavo @[10‥13) "naĭ",
]"""
json = """[{"Bare":{"Cmavo":{"phonemes":"a'a","span":[0,3]}}},{"Bare":{"Cmavo":{"phonemes":"naĭ","span":[3,6]}}},{"Bare":{"Cmavo":{"phonemes":"a'e","span":[7,10]}}},{"Bare":{"Cmavo":{"phonemes":"naĭ","span":[10,13]}}}]"""
