id = "adhoc.v0.morphology.basic.lohu-quotes-words"
lojban = "lo'u mi le'u"
tags = ["v0-adhoc", "morphology"]

[expectations.morphology]
status = "success"
raw = """[WordLike(LohuQuote { lohu: Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "lo'u" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 0, byte_end: 4, char_start: 0, char_end: 4, start: None, end: None }) }), quoted_words: [Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "mi" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 5, byte_end: 7, char_start: 5, char_end: 7, start: None, end: None }) })], lehu: Word(Cmavo { phonemes: Phonemes(PhonemesData { text: "le'u" }), span: SourceSpan(SourceSpanData { source_id: Some(SourceId("<fixture>")), byte_start: 8, byte_end: 12, char_start: 8, char_end: 12, start: None, end: None }) }) })]"""

[expectations.output.vlasei]
brackets = "(lo'u mi le'u)"
tree = """
[
  LohuQuote @[0‥12) {
    lohu: Cmavo @[0‥4) "lo'u",
    Cmavo @[5‥7) "mi",
    lehu: Cmavo @[8‥12) "le'u",
  },
]"""
json = """[{"LohuQuote":{"lohu":{"Cmavo":{"phonemes":"lo'u","span":[0,4]}},"quoted_words":[{"Cmavo":{"phonemes":"mi","span":[5,7]}}],"lehu":{"Cmavo":{"phonemes":"le'u","span":[8,12]}}}}]"""
