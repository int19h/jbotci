id = "cll.10.108.c10e15d9"
lojban = "la .djan. pu cusku le se du'u la .alis pu cusku le se du'u la .djordj. pu cusku le se du'u la .maris. nau klama le zarci"
translation-en = "John said that Alice had said that George had earlier said that Mary is now going to the market."
gloss-en = "That-named John [past] says the - statement-that"

