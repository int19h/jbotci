id = "cll.10.93 10.94 10.95 10.96 10.97 10.98 10.99.c10e14d1 c10e14d2 c10e14d3 c10e14d4 c10e14d5 c10e14d6 c10e14d7"
lojban = "pu zu ki ku ne'i ki le kevna le ninmu goi ko'a zutse le rokci .i ko'a citka loi kanba rectu .i ko'a pu jukpa ri le mudyfagri .i lei rectu cu zanglare .i le labno goi ko'e ba za ki nenri klama le kevna .i ko'e lebna lei rectu ko'a .i ko'e bartu klama"
translation-en = "Long ago, in a cave, a woman sat on a rock. She was eating goat's meat. She had cooked the meat over a wood fire. The meat was pleasantly warm. A while later, a wolf came into the cave. It took the meat from her. It ran out."
gloss-en = "Combined story-time discourse from Examples 10.93-10.99."

