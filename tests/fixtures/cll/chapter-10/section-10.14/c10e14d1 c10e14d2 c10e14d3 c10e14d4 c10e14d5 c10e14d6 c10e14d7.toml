translation-en = "Long ago, in a cave, a woman sat on a rock. She was eating goat's meat. She had cooked the meat over a wood fire. The meat was pleasantly warm. A while later, a wolf came into the cave. It took the meat from her. It ran out."
gloss-en = "Combined story-time discourse from Examples 10.93-10.99."

