translation-en = "I like hot food, and you like cold food, and Jane likes lukewarm food."
gloss-en = "I like part-of-the-mass-of hot-type-of food. And you like the-opposite-of the-last-mentioned. And that-named Jane likes the-neutral-value-of something-mentioned."

