id = "cll.16.64.c16e9d8"
lojban = "naku su'ode roda zo'u da prami de"
translation-en = """
It is false that: there is at least one thing that is loved by everybody.
There isn't any one thing that everybody loves."""
gloss-en = "It-is-false-that: there-is-a-Y-such-that for-each-X : X loves Y."

