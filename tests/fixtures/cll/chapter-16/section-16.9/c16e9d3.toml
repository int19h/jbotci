lojban = "naku de zo'u de zutse"
translation-en = """
It is false that something sits.
Nothing sits."""
gloss-en = """
It-is-not-the-case-that: for-some-Y : Y sits.
It-is-false-that: for-at-least-one-Y : Y sits."""

