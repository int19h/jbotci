id = "cll.16.78.c16e10d6"
lojban = "su'oda zo'u mi prami da .i naku do prami da"
translation-en = "There is something that I love that you don't."
gloss-en = "For-at-least-one-thing : I love that-thing. And it-is-false-that : you love that-(same)-thing."

