id = "muplis.18.1307.canonical"
lojban = "ge pa da poi ge ke'a litce gi ke'a ladru ku'o zo'u ko erve tu'a da lu'u gi ga nai su'o da poi ke'a caksova ku'o zo'u da zvati gi pare da poi ke'a me tu'a lo NALSELTRO zei da ku lu'u me'u ku'o zo'u ko erve tu'a da lu'u"
