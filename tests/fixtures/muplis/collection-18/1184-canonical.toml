id = "muplis.18.1184.canonical"
lojban = """
ju'a nai ma goi ko'a zo'u cy pa nu ca cy no zo'u ko'a jibri do kei
.i ju'a nai cy no nu do makcu kei
.i do djica cy pa"""
translation-en = "What do you want to do when you grow up?"

