id = "muplis.18.1592.canonical"
lojban = """
ju'a nai cy re muzga
.i ju'a nai ge cy pa tadni gi cy pa za'u mei
.i ju'a nai ge cy no ctuca gi cy no pa mei
.i ge ca ku zo'u cy no zvati cy re gi ca ku zo'u cy pa zvati cy re"""
translation-en = "The teacher and the pupils are in the museum."

