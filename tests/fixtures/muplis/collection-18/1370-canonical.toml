id = "muplis.18.1370.canonical"
lojban = """
cy pa srana mi
.i ju'a nai ge cy pa cutci gi cy pa pa mei
.i ju'a nai ge cy no gerku gi cy no pa mei
.i pu ku mo'u ku zo'u cy no citka cy pa"""
translation-en = "The dog ate my shoe."

