id = "muplis.18.1159.canonical"
lojban = """
ju'a nai cy pa ka ce'u gasnu cy no kei
.i ju'a nai cy no nu do zvati ti kei
.i ga nai na ku do djica cy no gi na ku do bilga cy pa"""
translation-en = "You don't have to hang around if you don't want to."

