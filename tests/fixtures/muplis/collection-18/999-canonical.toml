id = "muplis.18.999.canonical"
lojban = """
cy re ka li ma'o fypa mo'e ce'u lo'o sarcu kei
.i ro da zo'u li ma'o fypa mo'e da lo'o nu do zukte da kei
.i cy no ka ce'u klama tu kei
.i cy no pavdzakai cy re"""
translation-en = "The only thing you need to do is go there."

[[provenance]]
kind = "muplis"
