id = "muplis.18.1319.canonical"
lojban = """
ju'a nai cy pa ka ce'u simsa ra cy no kei
.i ju'a nai cy no ka ma goi ko'a zo'u ce'u tarti ko'a kei
.i na ku ko troci cy pa"""
translation-en = "Do not try to imitate her."

