id = "muplis.18.1303.canonical"
lojban = """
ju'a nai cy re du'u cy no zukte cy pa kei
.i cy pa zekri
.i ju'a nai cy no nanmu
.i xu kau zo'u do birti cy re"""
translation-en = "How certain are you that he's a criminal?"

