id = "muplis.18.1003.canonical"
lojban = """
cy re nu mi klama fu cy pa kei
.i cy pa ka cy no marce ce'u kei
.i cy no vinji
.i mi terpa cy re"""
translation-en = "Now, it so happens that I'm afraid of flying."

