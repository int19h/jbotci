lojban = """
ju'a nai cy re nu posyve'u cy pa la tom. kei
.i cy pa cidja cy no
.i cy no gerku
.i pu ku te zu'e cy re zo'u la tom. klama"""
translation-en = "Tom went to buy dog food."

