id = "muplis.18.1799.canonical"
lojban = """
ju'a nai cy no stuzi
.i tu'a cy no lu'u tolkargu
.i cy no ke du'e va'e glare ke'e"""
translation-en = "On the one hand, the place is cheap. On the other hand, it's too hot."

