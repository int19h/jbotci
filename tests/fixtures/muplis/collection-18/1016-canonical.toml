id = "muplis.18.1016.canonical"
lojban = """
ju'a nai cy pa cacra li so'i boi lo'o
.i ju'a nai cy no fetsi
.i pu ze'a cy pa ru'i ku zo'u cy no klaku"""
translation-en = "She cried for hours without ceasing."

