id = "muplis.18.1219.canonical"
lojban = """
ju'a nai cy no gurni
.i ge pu ku zi ku zo'u do sombo cy no gi cu'e ku zo'u do sombo cy no"""
translation-en = "You sowed the grain a little while ago; when else do you sow it?"

