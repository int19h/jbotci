id = "muplis.18.1375.canonical"
lojban = """
cy re ka ce'u pluka kei
.i ju'a nai ge cy pa jubme gi cy no xo'i ne'i cy pa
.i ju'a nai va ku zo'u cy no kumfa
.i cy pa mutce cy re"""
translation-en = "The table in that room is very nice."

