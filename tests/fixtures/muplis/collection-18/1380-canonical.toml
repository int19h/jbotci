id = "muplis.18.1380.canonical"
lojban = """
ju'a nai cy pa rupnu li rau boi lo'o
.i ju'a nai cy no ke laldo nanmu ke'e
.i cy no ponse cy pa"""
translation-en = "The old man has enough money."

