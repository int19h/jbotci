id = "muplis.18.1512.canonical"
lojban = """
ju'a nai cy pa traji cy no
.i ju'a nai cy no ka ce'u zabna kei
.i pa da poi ke'a ke cnino skami ke'e ku'o se va'u mi zo'u vecnu da mi
.i gau ko zo'u mi zgana cy pa"""
translation-en = "I would like to buy myself a new computer; show me the best model."

