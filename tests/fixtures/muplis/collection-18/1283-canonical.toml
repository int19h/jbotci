id = "muplis.18.1283.canonical"
lojban = """
ju'a nai cy no ritygu'e
.i ga nai su'o da poi ke'a ke drata gugde ke'e ku'o zo'u mi xabju da gi mi xabju cy no"""
translation-en = "If I were to live abroad, I would live in Britain."

