id = "muplis.18.1441.canonical"
lojban = """
ju'a nai cy no nu su'o da poi ke'a jdini ku'o zo'u mi dunda tu'a da lu'u la tom. kei
.i pu ku zo'u na ku mi djica cy no"""
translation-en = "I didn't want to give Tom any money."

