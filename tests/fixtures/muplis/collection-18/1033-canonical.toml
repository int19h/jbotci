id = "muplis.18.1033.canonical"
lojban = """
ju'a nai cy pa ka ce'u ce ke do ke'e simxu cy no kei
.i ju'a nai cy no ka ce'u penmi kei
.i mi ckaji cy pa"""
translation-en = "Nice to meet you."

