id = "muplis.18.1076.canonical"
lojban = """
cy ci nu cy re desku kei
.i ju'a nai cy re terdi
.i ju'a nai cy pa ponjo
.i cy no prulamdei
.i ca cy no bu'u cy pa ri'a cy ci so'i boi da poi ke'a dinju ku'o co'a ku zo'u da porpi"""
translation-en = "A lot of buildings collapsed in Japan due to the earthquake yesterday."

