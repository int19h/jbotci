id = "muplis.18.1363.canonical"
lojban = """
cy ci ka ce'u xusra cy re kei
.i ge cy re jitfa gi cy re simlu cy pa
.i cy pa ka ce'u jetnu kei
.i ju'a nai cy no ninmu
.i na ku cy no certu cy ci"""
translation-en = "She's a bad liar."

