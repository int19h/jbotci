id = "muplis.18.1742.canonical"
lojban = """
ju'a nai cy pa nenri
.i ju'a nai ro da zo'u ge li ma'o fyno mo'e da lo'o me da me'u gi li ma'o fyno mo'e da lo'o za'u mei
.i su'o da pu ku zo'u li ma'o fyno mo'e da lo'o klama cy pa"""
translation-en = "They came in."

