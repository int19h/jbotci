id = "muplis.18.1739.canonical"
lojban = """
ju'a nai cy pa ka tu'o mo cei broda xo boi da poi ke'a fenki ku'o zo'u ce'u broda da kei
.i ju'a nai ro da zo'u ge li ma'o fyno mo'e da lo'o me da me'u gi li ma'o fyno mo'e da lo'o za'u mei
.i su'o da zo'u li ma'o fyno mo'e da lo'o zenba cy pa"""
translation-en = "They're going crazy."

