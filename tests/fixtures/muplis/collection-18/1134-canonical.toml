id = "muplis.18.1134.canonical"
lojban = """
ju'a nai cy re nu cy no vofli kei
.i ju'a nai cy pa canko cy no
.i cy no vinji
.i na ku ka'e ku ca cy re zo'u kargau cy pa"""
translation-en = "You can't open a window on a plane."

