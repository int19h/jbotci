id = "muplis.18.1847.canonical"
lojban = """
ge ju'a nai cy pa perli gi cy pa me tu me'u
.i ge ju'a nai cy no plise gi cy no me ti me'u
.i ge vecnu cy no mi gi vecnu cy pa mi"""
translation-en = "I'm buying these apples and, umm, the pears over there."

