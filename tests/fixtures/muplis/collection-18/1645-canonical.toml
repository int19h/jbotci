id = "muplis.18.1645.canonical"
lojban = """
cy pa du'u ka'e ku zo'u do zenba cy no kei
.i cy no ka ce'u sutra kei
.i ka'e ku zo'u do zenba cy no
.i ge na ku ko jinvi cy pa gi ko djuno cy pa"""
translation-en = "You're faster than this. Don't just think you are, know you are."

