id = "muplis.18.1812.canonical"
lojban = """
cy vo nu mi klama cy ci kei
.i ju'a nai cy ci korbi cy re
.i ju'a nai cy re xamsi
.i cy pa jibni cy no
.i ju'a nai cy no xamsi
.i su'o da zo'u ge ja'e da zo'u mi xabju cy pa gi fi'o du da zo'u cy vo cafne"""
translation-en = "I live near the sea so I often get to go to the beach."

[[provenance]]
kind = "muplis"
collection-id = "18"
item-id = "1812"
form = "canonical"
url = "https://lensisku.lojban.org/en/collections/18"

