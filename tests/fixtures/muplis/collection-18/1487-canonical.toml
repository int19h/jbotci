id = "muplis.18.1487.canonical"
lojban = """
ju'a nai cy no du'u pa da poi ke'a gerku ku'o zo'u la tom. ralte da kei
.i pu ku zo'u na ku mi djuno cy no"""
translation-en = "I didn't know Tom had a dog."

