id = "muplis.18.1841.canonical"
lojban = """
cy pa nu mi sanji kei
.i ge ju'a nai cy no ke vorme janbe ke'e gi cy no me ti me'u
.i cy no zilpli cy pa"""
translation-en = "This doorbell is to call me."

