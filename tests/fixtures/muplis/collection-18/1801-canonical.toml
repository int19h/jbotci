id = "muplis.18.1801.canonical"
lojban = """
ge cy re spati gi cy pa pagbu cy re
.i ka'e ku zo'u cy pa cidja
.i cy no zumri
.i cy no me cy re me'u"""
translation-en = "Corn... ah... is the plant containing edible portions."

