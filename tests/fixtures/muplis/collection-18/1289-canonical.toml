id = "muplis.18.1289.canonical"
lojban = """
ju'a nai cy pa ka ca cy no zo'u ce'u gleki kei
.i ju'a nai cy no ke cnino detna'a ke'e
.i mi zandapma do cy pa"""
translation-en = "I wish you a Happy New Year."

