id = "muplis.18.1798.canonical"
lojban = """
ju'a nai cy vo ka ce'u citka do kei
.i ju'a nai cy ci ka ce'u rivbi kei
.i ju'a nai cy re ka ce'u citno kei
.i ju'a nai ro da zo'u ge li ma'o fypa mo'e da lo'o me da me'u gi li ma'o fypa mo'e da lo'o za'u mei
.i ju'a nai cy no ci moi
.i ma'i cy no ba ku su'o da zo'u ga nai ge li ma'o fypa mo'e da lo'o du'e va'e cy re gi li ma'o fypa mo'e da lo'o ricfu gi ge li ma'o fypa mo'e da lo'o snada cy ci gi li ma'o fypa mo'e da lo'o troci cy vo"""
translation-en = "On the gripping hand, if they're too young and healthy they will escape and attempt to eat you."

