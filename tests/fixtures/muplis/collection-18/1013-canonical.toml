id = "muplis.18.1013.canonical"
lojban = """
ju'a nai cy re du'u cy no prami do kei
.i ju'a nai cy pa morna tu'a cy no lu'u
.i ju'a nai cy no fetsi
.i cy pa sinxa cy re"""
translation-en = "Her look says that she loves you."

