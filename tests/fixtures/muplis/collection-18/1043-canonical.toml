id = "muplis.18.1043.canonical"
lojban = """
ju'a nai ge cy pa pevysmacu gi cy pa ke steci srana ke'e mi
.i ju'a nai ge cy no smacu gi cy no pa mei
.i cy no zutse cy pa"""
translation-en = "Huh? A mouse sits on my mouse."

