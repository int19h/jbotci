id = "muplis.18.1755.canonical"
lojban = """
ju'a nai ro da zo'u li ma'o fyci mo'e da lo'o ckaji li ma'o fyre mo'e da lo'o
.i ju'a nai ro da zo'u li ma'o fyre mo'e da lo'o ka pu ku zo'u da nupre ce'u kei
.i ro da zo'u li ma'o fypa mo'e da lo'o gunma li ma'o fyno mo'e da lo'o
.i ju'a nai ro da zo'u ge li ma'o fyno mo'e da lo'o me da me'u gi li ma'o fyno mo'e da lo'o za'u mei
.i su'o da pu ku zo'u na ku li ma'o fypa mo'e da lo'o tinbe li ma'o fyci mo'e li ma'o fypa mo'e da lo'o lo'o"""
translation-en = "They didn't keep their promise."

