id = "muplis.18.1633.canonical"
lojban = """
ju'a nai cy pa ka so'i boi da zo'u ce'u ponse da kei
.i ju'a nai cy no fetsi
.i pu ku zo'u cy no ricfu cy pa"""
translation-en = "She was very rich."

