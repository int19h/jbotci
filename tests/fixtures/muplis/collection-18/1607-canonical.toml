id = "muplis.18.1607.canonical"
lojban = """
cy pa ka do djica li ma'o fyno mo'e ce'u lo'o kei
.i ju'a nai ro da zo'u li ma'o fyno mo'e da lo'o nu cusku da kei
.i xu kau su'o da zo'u da ckaji cy pa"""
translation-en = "Is there anything you want to say?"

