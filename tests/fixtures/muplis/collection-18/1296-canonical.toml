id = "muplis.18.1296.canonical"
lojban = """
cy pa ka do djica li ma'o fyno mo'e ce'u lo'o kei
.i ro da zo'u li ma'o fyno mo'e da lo'o nu do zukte da kei
.i na ku la'e do'i lu'u ckaji cy pa"""
translation-en = "I'm sure that's not what you want to do."

