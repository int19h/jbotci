id = "muplis.18.1154.canonical"
lojban = """
cy re ka ce'u pencu cy pa kei
.i ge ju'a nai cy pa jimca gi cy pa me ti me'u
.i cy no ka ma goi ko'a mo'u ku su'o da zo'u ce'u plipe fo ko'a da kei
.i do raunzu cy no cy re"""
