id = "muplis.18.1834.canonical"
lojban = """
cy ci ka ce'u simxu cy re kei
.i cy re ka ce'u tavla kei
.i cy pa ka ro da poi ke'a detydei ku'o su'o roi da zo'u lu'a ce'u lu'u pinxe cy no kei
.i cy no tcati
.i cy pa ritli fi mi'a cy ci"""
translation-en = "To drink tea is our ritual that we perform every day in order to talk to each other."

[[provenance]]
kind = "muplis"
collection-id = "18"
item-id = "1834"
form = "canonical"
url = "https://lensisku.lojban.org/en/collections/18"

