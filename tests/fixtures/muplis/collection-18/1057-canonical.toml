id = "muplis.18.1057.canonical"
lojban = """
cy pa ka ce'u ke censa vrude ke'e kei
.i cy no ka ce'u remna kei
.i cy no ka ta'e ku zo'u ce'u srera kei
.i cy pa ka ka'e ku zo'u ce'u fraxu kei"""
translation-en = "To err is human, to forgive divine."

