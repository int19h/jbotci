id = "muplis.18.1492.canonical"
lojban = """
cy vo nu co'a ku zo'u mi birti kei
.i ju'a nai cy ci ni li za'u boi lo'o krici ce'u kei
.i ju'a nai cy pa platu cy re
.i ju'a nai cy pa za'u mei
.i ju'a nai cy no pa moi
.i pu ku ca cy no zo'u na ku mi birti tu'a cy re lu'u
.i tu'a cy ci lu'u rinka cy vo"""
translation-en = "I wasn't sold on their plan at first, but their conviction won me over."

