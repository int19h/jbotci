id = "muplis.18.1330.canonical"
lojban = """
cy pa nu mi sidju ra tu'a cy no lu'u kei
.i ju'a nai ge cy no zdakemkulgu'a gi cy no srana ra
.i ra djica cy pa"""
translation-en = "She wants me to help her with her homework."

