id = "muplis.18.1278.canonical"
lojban = """
ge cy pa srana mi gi cy pa me cy no me'u
.i ju'a nai ge cy no pixra gi cy no za'u mei
.i ma goi ko'a zo'u cy pa zvati ko'a"""
translation-en = "Where are my pictures?"

