id = "muplis.18.1743.canonical"
lojban = """
cy pa vanju
.i ju'a nai ro da zo'u ge li ma'o fyno mo'e da lo'o me da me'u gi li ma'o fyno mo'e da lo'o za'u mei
.i su'o da zo'u li ma'o fyno mo'e da lo'o ralte cy pa"""
translation-en = "They have wine."

