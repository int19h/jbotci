id = "muplis.18.1350.front"
lojban = "la obamas pu xusra lo du'u la romni cu tolmo'i tu'a le se jinvi be ri i je cu'u obu boi ry kanpe lo nu do'o si'a tolmo'i"
translation-en = "Obama said that Romney is forgetting what his own positions are — 'and he's betting that you will too'."

