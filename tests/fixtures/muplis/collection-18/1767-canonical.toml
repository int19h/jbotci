lojban = """
cy pa gunma cy no
.i ju'a nai ge va ku zo'u cy no xrula gi cy no za'u mei
.i su'o da poi ke'a titla ku'o zo'u da panci cy pa"""
translation-en = "Those flowers smell sweet."

