id = "muplis.18.1835.canonical"
lojban = """
ge ju'a nai cy pa sfani gi cy pa me cy no me'u
.i ju'a nai ge cy no me ti me'u gi cy no za'u mei
.i xu kau zo'u cy pa ckape"""
translation-en = "Are these flies dangerous?"

