id = "muplis.18.1402.canonical"
lojban = """
cy ci ka ce'u kakne cy re kei
.i cy re ka ge ce'u pensi gi ce'u tavla kei
.i cy pa danlu
.i cy no remna
.i cy no frica cy pa cy ci"""
translation-en = "Human beings are different from animals in that they can think and speak."

