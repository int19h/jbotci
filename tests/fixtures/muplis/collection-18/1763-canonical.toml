id = "muplis.18.1763.canonical"
lojban = """
ju'a nai cy re tsani
.i cy pa gunma cy no
.i ju'a nai ge cy no tarci gi cy no za'u mei
.i pu ku bu'u cy re zo'u ke carmi gusni ke'e fi cy pa"""
translation-en = "The stars shone in the sky."

