id = "muplis.18.1773.canonical"
lojban = """
ju'a nai cy ci ka ma goi ko'a se la'u ko'a zo'u ce'u zdile kei
.i ju'a nai cy re nu pinxe cy pa kei
.i cy pa gunma cy no
.i ju'a nai cy no ckafi
.i zmadu cy re cy ci"""
translation-en = "It's more fun than drinking coffee."

