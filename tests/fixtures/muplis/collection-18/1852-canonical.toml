id = "muplis.18.1852.canonical"
lojban = """
ju'a nai cy vo du'u cy re mutce cy ci kei
.i cy ci ka ce'u vajni kei
.i ge ju'a nai cy re uenci cy pa gi cy re me ti me'u
.i cy pa nu cy no farvi kei
.i cy no bangu
.i mi jinvi cy vo"""
translation-en = "I think that these documents containing the development of the language are very important."

