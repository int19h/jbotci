id = "muplis.18.1737.canonical"
lojban = """
ju'a nai cy pa nu do djuno cy no kei
.i ju'a nai cy no du'u ma goi ko'a mu'i ko'a zo'u na ku pu ku zo'u mi zukte ra kei
.i xu kau zo'u do djica cy pa"""
translation-en = "Don't you want to know why I didn't do that?"

