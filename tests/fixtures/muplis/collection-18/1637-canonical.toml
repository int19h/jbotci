ju'a nai cy re du'u tu'o mo cei broda zo'u cy pa broda kei
.i ju'a nai cy pa patfu
.i ju'a nai ge cy no fetsi gi cy no pa mei
.i na ku cy no djuno cy re"""
translation-en = "She doesn't know who the father is."

