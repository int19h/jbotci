id = "muplis.18.1077.canonical"
lojban = """
cy re gunma cy pa
.i cy pa snime
.i ju'a nai cy no prulamdei
.i ca cy no mo'u ku zo'u cy re carvi"""
translation-en = "Yesterday snow fell."

