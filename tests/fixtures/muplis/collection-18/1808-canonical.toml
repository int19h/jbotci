id = "muplis.18.1808.canonical"
lojban = """
cy pa bitmu
.i ju'a nai cy no karce
.i su'o da zo'u ge se ri'a da zo'u cy no janli cy pa gi fi'o du da co'a ku zo'u cy no porpi"""
translation-en = "The car crashed into the wall."

