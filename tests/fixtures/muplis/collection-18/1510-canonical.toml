cy re ka ce'u djica cy pa kei
.i ju'a nai cy pa nu za'u re'u ku zo'u mi viska cy no kei
.i ju'a nai cy no nanmu
.i mi no va'e cy re"""
translation-en = "I have no wish to see the man again."

