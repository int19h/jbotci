id = "muplis.18.1366.canonical"
lojban = """
ju'a nai cy pa plise
.i ju'a nai cy no ninmu
.i pu ku pa da poi ke'a me cy pa me'u ku'o zo'u cy no citka da"""
translation-en = "She ate one apple."

