id = "muplis.18.1797.canonical"
lojban = """
ju'a nai ro da zo'u ge li ma'o fyre mo'e da lo'o me da me'u gi li ma'o fyre mo'e da lo'o re mei
.i ju'a nai cy pa ro moi
.i ju'a nai cy no pa moi
.i ma'i cy no zo'u ckape
.i ma'i cy pa zo'u cinri
.i su'o da ma'i li ma'o fyre mo'e da lo'o zo'u sarcu"""
translation-en = "On the one hand it is dangerous. On the other hand it is interesting. From both points of view it is necessary."

[[provenance]]
kind = "muplis"
collection-id = "18"
item-id = "1797"
form = "canonical"
url = "https://lensisku.lojban.org/en/collections/18"

