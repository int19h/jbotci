brackets = "(ju'a-naĭ [{(ro da) zo'u (ge [{li ([ma'o {fy re}] [mo'e da]) lo'o} {me da me'u}] gi [{li ([ma'o {fy re}] [mo'e da]) lo'o} {re meĭ}])} {.i-ju'a-naĭ ([cy pa ro] moĭ)} {.i-ju'a-naĭ ([cy no pa] moĭ)} {.i ([ma'i {cy no}] zo'u ckápe)} {.i ([ma'i {cy pa}] zo'u cínri)} {.i ([{su'o da} {ma'i (li [{ma'o (fy re)} {mo'e da}] lo'o)}] zo'u sárcu)}])"

