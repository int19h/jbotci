id = "muplis.18.1394.canonical"
lojban = """
cy vo nu cy ci ke skiji sakli ke'e kei
.i ju'a nai cy ci nei
.i cy re tuple cy pa
.i ju'a nai cy pa nei
.i ju'a nai cy no nanmu
.i pu ku ze'a cy vo gau cy no zo'u cy re spofu"""
