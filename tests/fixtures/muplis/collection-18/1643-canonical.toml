id = "muplis.18.1643.canonical"
lojban = """
ju'a nai cy pa ka ce'u sipna kei
.i ju'a nai cy no savru
.i pu ku ri'a tu'a cy no lu'u zo'u na ku mi kakne cy pa"""
translation-en = "I could not sleep because of the noise."

