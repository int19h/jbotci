id = "muplis.18.1811.canonical"
lojban = """
ju'a nai cy re muzga cy pa
.i cy pa danlu
.i ju'a nai cy no prulamdei
.i ca cy no zo'u mi klama cy re"""
translation-en = "I went to the zoo yesterday."

