cy ci ka ce'u ciska fi cy re kei
.i ju'a nai cy re uitki
.i ju'a nai cy pa jufra cy no
.i ju'a nai ke mulno ciksi ke'e cy no
.i ba ku zo'u mi cusku cy pa fo cy ci"""
