id = "muplis.18.1753.canonical"
lojban = """
ro da zo'u li ma'o fypa mo'e da lo'o gunma li ma'o fyno mo'e da lo'o
.i ju'a nai ro da zo'u ge li ma'o fyno mo'e da lo'o me da me'u gi li ma'o fyno mo'e da lo'o za'u mei
.i su'o da pu ku so'i boi de poi citka ke'a ku'o zo'u li ma'o fypa mo'e da lo'o dunda fi mi'a de"""
translation-en = "They gave us a lot to eat."

