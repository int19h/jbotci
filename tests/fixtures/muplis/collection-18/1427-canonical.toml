id = "muplis.18.1427.canonical"
lojban = """
ju'a nai cy pa nu su'o da poi ke'a zabna ku'o zo'u da menli mi kei
.i cy no bartu
.i bu'u cy no mu'i cy pa zo'u mi cadzu"""
translation-en = "I'll just go for a walk to clear my head."

