id = "muplis.18.1760.canonical"
lojban = """
ro da zo'u li ma'o fypa mo'e da lo'o gunma li ma'o fyno mo'e da lo'o
.i ju'a nai ro da zo'u ge li ma'o fyno mo'e da lo'o me da me'u gi li ma'o fyno mo'e da lo'o za'u mei
.i pa da poi ke'a snuji ku'o su'o de ca ku ca'o ku zo'u li ma'o fypa mo'e de lo'o citka da"""
translation-en = "They are eating a sandwich."

