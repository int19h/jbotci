ju'a nai cy re du'u cy pa sarcu kei
.i ju'a nai cy pa nu do benji cy no kei
.i ju'a nai ge cy no xatra gi cy no za'u mei
.i ge na ku co'u ku zo'u ko morji cy re gi ko zukte cy pa"""
