id = "muplis.18.1834.front"
lojban = "i lo ka lu'a ce'u su'o roi ro detydei cu pinxe lo tcati vau fi mi'a ritli lo ka simxu lo ka tavla"
translation-en = "To drink tea is our ritual that we perform every day in order to talk to each other."

