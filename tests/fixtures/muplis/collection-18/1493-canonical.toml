id = "muplis.18.1493.canonical"
lojban = """
ju'a nai cy pa ka ce'u sipna kei
.i ju'a nai cy no nu glare kei
.i pu ku ki'u cy no zo'u mi fliba cy pa"""
translation-en = "I couldn't sleep because of the heat."

