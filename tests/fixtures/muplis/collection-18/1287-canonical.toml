id = "muplis.18.1287.canonical"
lojban = """
ju'a nai ro da zo'u li ma'o fypa mo'e da lo'o ka li ma'o fyno mo'e da lo'o pluka mi ce'u kei
.i ju'a nai ro da zo'u li ma'o fyno mo'e da lo'o ka ce'u zukte da kei
.i no'o boi da zo'u ga nai da zdile da gi da ckaji li ma'o fypa mo'e da lo'o"""
translation-en = "If something is fun, I like to do it, of course."

