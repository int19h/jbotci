id = "muplis.18.1823.canonical"
lojban = """
ju'a nai ge cy no gerku gi cy no srana mi
.i ro da poi ke'a detydei ku'o re roi da gau mi zo'u cy no citka"""
translation-en = "I feed my dog twice a day."

