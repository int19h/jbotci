id = "muplis.18.1357.canonical"
lojban = """
ju'a nai ge cy re kumfa gi cy re srana cy pa
.i ju'a nai cy pa nu jukpa kei
.i ju'a nai cy no arxokuna
.i tu'o mo cei broda ca'o ku ne'i cy re zo'u cy no broda"""
translation-en = "What is the racoon doing in the kitchen?"

