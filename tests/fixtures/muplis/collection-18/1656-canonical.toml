id = "muplis.18.1656.canonical"
lojban = """
cy pa ke drata gugde ke'e
.i ju'a nai cy no patfu ra
.i pu ku co'a ku bu'u cy pa zo'u cy no morsi"""
translation-en = "It is said that his father died in a foreign country."

