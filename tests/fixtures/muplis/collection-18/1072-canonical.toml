id = "muplis.18.1072.canonical"
lojban = """
ju'a nai ro da zo'u ge li ma'o fyci mo'e da lo'o cutci gi li ma'o fyci mo'e da lo'o srana da
.i cy re vitke
.i ju'a nai cy pa nerklastu cy no
.i cy no ke ponjo zdani ke'e
.i bu'u cy pa co'u ku zo'u cy re dasni li ma'o fyci mo'e cy re lo'o"""
translation-en = "At the entrance of a Japanese house, visitors are generally asked to take off their shoes."

