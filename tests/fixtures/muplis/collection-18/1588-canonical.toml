id = "muplis.18.1588.canonical"
lojban = """
ju'a nai cy re nu na ku cy pa troci kei
.i ju'a nai cy pa nei
.i ju'a nai cy no munje
.i no da bu'u cy no se ja'e cy re zo'u da snada"""
translation-en = "No one succeeds in the world without effort."

