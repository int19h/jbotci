id = "muplis.18.1511.canonical"
lojban = """
ju'a nai cy re ka ca ku zo'u mi djica li ma'o fypa mo'e ce'u lo'o kei
.i ju'a nai ro da zo'u li ma'o fypa mo'e da lo'o nu mi penmi da kei
.i ge ju'a nai cy no fetsi gi cy no me ra me'u
.i cy no ckaji cy re"""
translation-en = "It is her that I want to meet."

[[provenance]]
kind = "muplis"
collection-id = "18"
item-id = "1511"
form = "canonical"
url = "https://lensisku.lojban.org/en/collections/18"

