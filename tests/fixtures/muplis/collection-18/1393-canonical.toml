id = "muplis.18.1393.canonical"
lojban = """
cy vo gunma cy ci
.i ge ve'i ku zo'u cy ci spisa gi cy ci so'i mei
.i cy re gunma cy pa
.i ju'a nai ge cy pa tapla gi pu ku co'a ku zo'u cy pa farlu fi cy no
.i ju'a nai cy no drudi
.i cy re porpi cy vo"""
translation-en = "The tiles that fell from the roof broke into very small pieces."

