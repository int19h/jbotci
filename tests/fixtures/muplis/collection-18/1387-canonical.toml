id = "muplis.18.1387.canonical"
lojban = """
ju'a nai cy pa ka zvafa'i ce'u kei
.i ju'a nai ro da zo'u ge li ma'o fyno mo'e da lo'o me da me'u gi li ma'o fyno mo'e da lo'o za'u mei
.i su'o da zo'u tu'a li ma'o fyno mo'e da lo'o lu'u nandu"""
translation-en = "They're hard to find."

