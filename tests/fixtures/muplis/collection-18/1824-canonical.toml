id = "muplis.18.1824.canonical"
lojban = """
ju'a nai cy re ke vifne vacri ke'e
.i ju'a nai cy pa nenri
.i ju'a nai cy no canko
.i cy no kalri cy pa cy re"""
translation-en = "The window is open letting the fresh air in."

