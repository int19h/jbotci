id = "muplis.18.1775.canonical"
lojban = """
ju'a nai cy pa ka ma goi ko'a se la'u ko'a zo'u ce'u zdile kei
.i ju'a nai cy no nu tadni kei
.i zmadu cy no cy pa"""
