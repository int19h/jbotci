ju'a nai ro da zo'u ge li ma'o fyno mo'e da lo'o me da me'u gi li ma'o fyno mo'e da lo'o za'u mei
.i su'o da ca ku zo'u ge li ma'o fyno mo'e da lo'o citno gi li ma'o fyno mo'e da lo'o kanro"""
