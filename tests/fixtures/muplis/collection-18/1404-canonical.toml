id = "muplis.18.1404.canonical"
lojban = """
ju'a nai du'u xu kau ka'e ku zo'u cy bi xabju cy pano kei cy papa
.i cy pano cnita cy so
.i ju'a nai tai ku zo'u cy so tsani
.i ge cy bi prenu gi ge cy bi gasnu cy xa gi cy bi gasnu cy ze
.i kanpe cy ze li so'u boi lo'o
.i cy xa fanza
.i ju'a nai cy mu nei
.i ju'a nai cy vo nu cy re catlu cy ci kei
.i ju'a nai cy ci tsani
.i cy re prenu
.i cy pa ka so'i boi da bu'u ce'u zo'u da tarci kei
.i ro da zo'u da carmi
.i ju'a nai cy no tsani
.i su'o da zo'u ge tai da pu ki cy no zo'u ckaji cy pa gi fi'o du da fau cy vo zo'u na ku ka'e ku zo'u na ku co'a ku zo'u cy re retsku cy papa cy mu"""
translation-en = "The sky was so starry, so bright that, looking at it, one could not help asking oneself whether ill-humoured and capricious people could live under such a sky."

