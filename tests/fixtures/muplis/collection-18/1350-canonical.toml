id = "muplis.18.1350.canonical"
lojban = """
cy re nu do'o tolmo'i kei
.i cy pa du'u la romni ku tolmo'i tu'a cy no lu'u kei
.i ju'a nai la romni ku jinvi cy no
.i ge pu ku zo'u la obamas. xusra cy pa gi cu'u la obamas. zo'u la romni ku kanpe cy re"""
translation-en = "Obama said that Romney is forgetting what his own positions are — 'and he's betting that you will too'."

