id = "muplis.18.1454.canonical"
lojban = """
cy re ka fau cy pa zo'u ce'u sazri cy no kei
.i ju'a nai cy pa nu mi makcu kei
.i cy no vinji
.i cy re cuntu mi"""
translation-en = "I want to be a pilot when I grow up."

