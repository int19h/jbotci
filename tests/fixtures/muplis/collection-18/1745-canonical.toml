id = "muplis.18.1745.canonical"
lojban = """
ju'a nai ro da zo'u ge ro de poi ke'a me da me'u ku'o zo'u li ma'o fypa mo'e da lo'o tixnu de gi li ma'o fypa mo'e da lo'o pa mei
.i cy no gunma la djo'uns.
.i cy no prami li ma'o fypa mo'e cy no lo'o"""
translation-en = "The Joneses love their daughter."

