id = "muplis.18.1391.canonical"
lojban = """
cy no ka ge ce'u namcrprimu gi su'o da poi ke'a namcrprimu ku'o zo'u ce'u lamli'e da kei
.i cy no steci li re boi lo'o"""
translation-en = "Two is the only prime whose successor is prime."

