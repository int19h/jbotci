id = "corpus.camxes.2517"
lojban = " i bazibo penmi la cpicinfo noi sipna mutce vreta le se solgu'i to e'u ko va'o le nu na djuno le du'u makau cpicinfo cu catlu le pixra toi i lu ko sanli doi lazni sei la noltruni'u cu cusku i ko klagau le vi citno ninmu le nu viska la jitfa cakyrespa gi'e tirna le cy lisri i ei mi xruti gi'e jitro so'o nuncatra noi mi pu minde li'u i ny cadzu cliva la alis noi stali tu'a la cpicinfo i la alis na mutce le ka nelci le jvinu be le danlu i ku'i abu pensi le du'u se snura dunli fa le nu stali cy kei le nu jersi le cilce noltruni'u i seki'ubo abu denpa "

