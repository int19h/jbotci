brackets = "(.i mo'i ni'a mo'i ni'a mo'i ni'a .i ka'e zúkte no dráta be la'e di'e .i se ki'u bo la .alis. za'u re'u co'a távla .i lu ju'o la .dinas. ba mútce le ka se cláxu mi keĭ ca le cabnícte to sa'a la .dinas. cu mlátu toĭ .i .a'o da ba mórji tu'a le dy ládru pálna ca le sánmi tcíka .i doĭ .dinas. noĭ dírba mi do'u .aŭ do mi kánsa le cníta .i .u'u no smácu cu zváti le vácri .i ku'i do ka'e kávbu lo volrátcu noĭ ka'u mútce le ka símsa lo'e smácu .i ku'i .a'u xu lo'e mlátu cu cítka lo'e volrátcu li'u .i ca ku la .alis. co'a sípydji lífri gi'e di'a sénva sézysku lu xu lo'e mlátu cu cítka lo'e volrátcu .i xu lo'e mlátu cu cítka lo'e volrátcu li'u .e su'o roĭ bo lu xu lo'e volrátcu cu cítka lo'e mlátu li'u .i se ja'e bo na vájni mútce fa le du'u pórsi ma kaŭ ki'u le nu [.a bu] ka'e spúda no le re préti .i [.a bu] lífri le nu pu'o sípna keĭ gi'e pu zi co'a sénva le nu [.a bu] xanjaĭsí'u cádzu kánsa la .dinas. gi'e cúsku lu ju'i doĭ .dinas. ko mi júngaŭ le jétnu .i xu do su'o roĭ cítka lo volrátcu li'u ca le nu súksa fa le nu [.a bu] le cpána be lo dérxi be loĭ grána ku joĭ loĭ súdga pézli mo'u fárlu)"
