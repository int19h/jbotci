id = "corpus.camxes.1988"
lojban = "i mo'ini'a mo'ini'a mo'ini'a i ka'e zukte no drata be la'e di'e iseki'ubo la alis za'ure'u co'a tavla i lu ju'o la dinas ba mutce le ka se claxu mi kei ca le cabnicte tosa'a la dinas cu mlatu toi i a'o da ba morji tu'a le dy ladru palna ca le sanmi tcika i doi dinas noi dirba mi do'u au do mi kansa le cnita i u'u no smacu cu zvati le vacri i ku'i do ka'e kavbu lo volratcu noi ka'u mutce le ka simsa lo'e smacu i ku'i a'u xu lo'e mlatu cu citka lo'e volratcu li'u i caku la alis co'a sipydji lifri gi'e di'a senva sezysku lu xu lo'e mlatu cu citka lo'e volratcu i xu lo'e mlatu cu citka lo'e volratcu li'u esu'oroibo lu xu lo'e volratcu cu citka lo'e mlatu li'u iseja'ebo na vajni mutce fa le du'u porsi makau ki'u le nu abu ka'e spuda no le re preti i abu lifri le nu pu'o sipna kei gi'e puzi co'a senva le nu abu xanjaisi'u cadzu kansa la dinas gi'e cusku lu ju'i doi dinas ko mi jungau le jetnu i xu do su'oroi citka lo volratcu li'u ca le nu suksa fa le nu abu le cpana be lo derxi be loi grana ku joi loi sudga pezli mo'u farlu"

