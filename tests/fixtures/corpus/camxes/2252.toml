lojban = " i abu zi ba le nu facki le du'u makau drani tadji le nu kurji cy to no'u le nu tongau cy ja'e lo jgena gi'e tagji jgari le cy pritu kerlo ku joi le cy zunle jamfu ja'e le nu rivbi le nu cy sezytolplo toi cu bevri cy le bartu vacri i lu lei du romu'ei le du'u mi na lebna le vi cifnu sei la alis pensi cu ba catra cy za lo djedi be li ji'ire i xu na zekri fa le nu cliva cy li'u i abu cladu cusku lei romoi valsi i le cmalu cu spuda cmoni to cy ca ba'o senci toi i lu ko na cmoni sei la alis cusku i nasai drani tadji le nu cusku li'u "

