brackets = "(.i lu cízra je za'úzra seĭ la .alis. kríxa to [.a bu] taĭ se spáji ja'e le nu ze'a tolmórji le nu ta'i ma kaŭ távla baŭ le dráni lójbo toĭ .i ca ku mi se tólplo taĭ tu'a lo'e bráraĭ darvístci .i co'o jámfu to sa'a ca le nu [.a bu] cátlu leĭ jámfu keĭ jy símlu le ka jíbni le ka na ka'e se víska keĭ keĭ ki'u le nu ca'o bínxo lo taĭ dárno toĭ .i .ŭu doĭ cmálu jámfu ma do ba dásygaŭ leĭ cútci ku joĭ leĭ do smóka doĭ dírba .i ju'o mi ba na ka'e go'i .i mi ba mútce dúkse le ka dárno do keĭ le nu kúrji do .i ko rénvi ta'i le do xágraĭ selká'e .i ku'i .eĭ mi jy xéndo seĭ la .alis. pénsi .i va'o da'i na'e bo la'e di'u ju'o cu'i jy na cádzu ve ka'a le mi se djíca .i .ŭa .aĭ mi dúnda ca ro cevjbetérsla lo cníno cútci re meĭ li'u)"
