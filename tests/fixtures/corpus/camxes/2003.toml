id = "corpus.camxes.2003"
lojban = " i lu cizra je za'uzra sei la alis krixa to abu tai se spaji ja'e le nu ze'a tolmorji le nu ta'i makau tavla bau le drani lojbo toi i caku mi se tolplo tai tu'a lo'e brarai darvistci i co'o jamfu tosa'a ca le nu abu catlu lei jamfu kei jy simlu le ka jibni le ka na ka'e se viska kei kei ki'u le nu ca'o binxo lo tai darno toi i uu doi cmalu jamfu ma do ba dasygau lei cutci ku joi lei do smoka doi dirba i ju'o mi ba na ka'e go'i i mi ba mutce dukse le ka darno do kei le nu kurji do i ko renvi ta'i le do xagrai selka'e i ku'i ei mi jy xendo sei la alis pensi i va'o da'i na'ebo la'e di'u ju'ocu'i jy na cadzu veka'a le mi se djica i ua ai mi dunda ca ro cevjbetersla lo cnino cutci remei li'u "

