id = "corpus.camxes.2451"
lojban = " i lu mi na jinvi le du'u tu ca'o stace kelci sei la alis co'a pante tonga cusku i ro tu da'arta'a ja'e le nu na ka'e tirna le nu tavla i tu simlu le ka na steci javni fi ce'u ija do'anai noda va'o le nu de ja'a javni cu jundi de i do na se xanri le du'u tai makau cfipu fa le du'u ro le dacti cu jmive i mu'a le bargu poi ei mi ca pagre cu co'a cadzu le drata fanmo be le foldi i mi pu'o darxi le jesymabru pe la noltruni'u ije ku'i ue jy to'o bajra ca le nu viska le nu le memimoi cu jbikla li'u "

