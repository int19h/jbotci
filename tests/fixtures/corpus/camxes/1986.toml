lojban = " i mo'ini'a mo'ini'a mo'ini'a i xu le nu farlu cu noroi mulno i lu mi kucli le du'u mi ca minli li xokau le ni farlu sei abu cladu cusku i ia mi pu'o jibni le midju be le terdi i ka'u minli li voki'o le ni cnita tosa'a la alis pu cilre so'o da la'e di'u le ckule i zu'u le cabna na matrai le nu jarco le ka djuno kei kei ki'u le nu noda abu tirna i zu'unai le nu rapsku cu xamgu abu le nu crebi'o toi i iese'i le se minli cu jibni drani i ku'i mi kucli le du'u makau ti stuzrlatitudi gi'e stuzrlongitudi li'u i to la alis nasai djuno le du'u makau smuni ga zo stuzrlatitudi gi zo stuzrlongitudi i ku'i abu jinvi le du'u melbi je banli valsi toi"

