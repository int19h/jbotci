id = "corpus.camxes.2788"
lojban = " i le clani srasu cu vruvricypra bu'u lei my jamfu ca le nu la blabi ractu cu sutra klama i la smacu noi terpa cu jacre'o pagre le jibni la'ucma i my tirna le sance be lei tcati kabri ca le nu la cibmasti cicyractu cu kansa lei cycy pendo le ze'e nu sanmi i le cpina voksa be la noltruni'u cu minde fi le nu lei ny malselfu'a vitke cu se catra i le xarju cifnu cu za'ure'u senci ga'ure'o le cidni be la noltroni'u ca le nu loi palta ku joi loi palne cu sruri porpi i za'ure'uku le selkrixa be la cpicinfo le snamli be le tanbo pinsi pe le rebyrespa le se zunva'u be lei smacrkobaiu zo'u le romei cu se tisna le vacri gi'e jorne le darno kaksna be la tolgeitce ke jitfa cakyrespa"

