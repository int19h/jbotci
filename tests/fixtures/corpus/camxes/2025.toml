lojban = " i lu y la'anai sei la alis surgau tonga cusku i ko na fengu i ku'i au mi ka'e jarco le mi'a mlatu no'u la dinas do i pe'i do co'a nelci lo'e mlatu va'o le nu da'i do dy viska i dy tai dirba smaji sei la alis tecu'uru'e le sevzi ca le nu lazni limna le lalxu ca'o co'e i dy melbi cmoni zutse ne'a le fagri gi'e tacpe'u le dy xance gi'e lumci le dy flira i dy tai pluka ranti le nu kujyjai i dy tai certu le nu kavbu lo'e smacu i oise'i ko mi fraxu sei la alis noi birti le du'u la smacu noi caku tinsa cu je'u cnicro cu za'ure'u krixa i mi'o dy na ba di'a casnu va'o le nu do zmanei li'u "

