brackets = "(.i [.a bu] ze'a dénpa gi'e tírna no lo za'u moĭ .i ro maĭ tírna lo sánce be lo cmálu cárce xíslu .e so'i saĭ vóksa noĭ távla kansí'u .i [.a bu] snáda le nu jímpe tu'a leĭ válsi .i lu le dráta sérti ma zváti .i .ŭa .eĭ mi bévri le pa meĭ .i la .bil. cu co'e le dráta .i ju'i .bil. ko ta ti bévri doĭ cítno .i ko ta púnji le vi kójna .i na go'i .i pu ku ko ta jonsímgaŭ .i ta za'o na préja lo gáltu bánzu .i ju'o ta ba xámgu bánzu .i ko na tcíla júndi .i ju'i .bil. ko jgári le vi skóri .i xu le drúdi ba sárji .i ko júndi le va klúza tápla .i .oĭ ta ca'o fárlu ju'i cníta to sa'a cládu pópsna toĭ .i ma ta gásnu .i ru'a la .bil. .i ma ba cníta kláma fo le dánmo túbnu .i mi na .e ko go'i .i .aĭ mi na go'i .i la .bil. ba go'i .i ju'i .bil. le selsé'u do mínde le nu do cníta kláma fo le dánmo túbnu li'u)"
