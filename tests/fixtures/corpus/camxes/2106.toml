id = "corpus.camxes.2106"
lojban = " i abu ze'a denpa gi'e tirna no lo za'umoi i romai tirna lo sance be lo cmalu carce xislu e so'isai voksa noi tavla kansi'u i abu snada le nu jimpe tu'a lei valsi i lu le drata serti ma zvati i ua ei mi bevri le pamei i la bil cu co'e le drata i ju'i bil ko ta ti bevri doi citno i ko ta punji le vi kojna i na go'i i puku ko ta jonsimgau i ta za'o na preja lo galtu banzu i ju'o ta ba xamgu banzu i ko na tcila jundi i ju'i bil ko jgari le vi skori i xu le drudi ba sarji i ko jundi le va kluza tapla i oi ta ca'o farlu ju'i cnita tosa'a cladu popsna toi i ma ta gasnu i ru'a la bil i ma ba cnita klama fo le danmo tubnu i mi na.e ko go'i i ai mi na go'i i la bil ba go'i i ju'i bil le selse'u do minde le nu do cnita klama fo le danmo tubnu li'u "

