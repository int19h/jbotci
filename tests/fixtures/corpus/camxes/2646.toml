id = "corpus.camxes.2646"
lojban = "i la risna noltrunau e la risna noltruni'u cu zutse le vo'a nolstizu ca le nu abu joi cy tolcliva i lo barda so'imei cu jmaji le sruri i ro klesi be loi cmalu cipni joi danlu be'o e ji'a le karda romei i le nolse'u cu sanli ca'u le remei gi'e se rinju lo linsi gi'e jbini lo sonci remei noi fanta i jibni la noltrunau fa la blabi ractu noi jgari nu'i ge lo tabra lo xance gi lo skapi te ciska clanu le drata i satci midju le kumfa fa lo jubme noi se cpana lo barda palne be loi rutytisna noi tai xamgu se jvinu ja'e le nu la alis xagji ri'a le nu catlu i lu au mulgau le nunpai sei abu pensi gi'e fairgau le cidja li'u i ku'i la'e di'u simlu le ka na lakne i seki'ubo abu co'a catlu ro sruri be abu tezu'e le nu le temci cu culno "

