brackets = "(.i la rísna noltrúnaŭ .e la rísna noltruní'u cu zútse le vo'a nolstízu ca le nu [.a bu] joĭ cy tolclíva .i lo bárda so'i meĭ cu jmáji le srúri .i ro klési be loĭ cmálu cípni joĭ dánlu be'o .e ji'a le kárda ro meĭ .i le nolsé'u cu sánli ca'u le re meĭ gi'e se rínju lo línsi gi'e jbíni lo sónci re meĭ noĭ fánta .i jíbni la noltrúnaŭ fa la blábi ráctu noĭ jgári nu'i ge lo tábra lo xánce gi lo skápi te císka clánu le dráta .i sátci mídju le kúmfa fa lo júbme noĭ se cpána lo bárda pálne be loĭ rutytísna noĭ taĭ xámgu se jvínu ja'e le nu la .alis. xágji ri'a le nu cátlu .i lu .aŭ múlgaŭ le núnpaĭ seĭ [.a bu] pénsi gi'e fáĭrgaŭ le cídja li'u .i ku'i la'e di'u símlu le ka na lákne .i se ki'u bo [.a bu] co'a cátlu ro srúri be [.a bu] te zu'e le nu le témci cu cúlno)"
