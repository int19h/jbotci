id = "corpus.camxes.2789"
lojban = " i my za'o zutse to lei kanla cu ganlo toi gi'e xadba krici le du'u my zvati la selmacygu'e iku'i my djuno le du'u le nu kargau ky cu banzu le nu roda binxo lo'e tolzdi fatci i le srasu cu vruvricypra gau le brife i le la'ucma cu se boxna gau lei jauspa i le sance be lei tcati kabri cu binxo le se lanjanbe i le cpina se krixa be la noltruni'u cu binxo le voksa be le lankurji nanla i le nunsenci be le cifnu le selkrixa be la cpicinfo ro le drata ke cizra savru zo'u le romei cu binxo sei my djuno le mixre sance be le zukcfu cange i le se cmoni be lei zu bakni cu basti lei tilju kaksna be la jitfa cakyrespa "

