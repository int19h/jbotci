id = "corpus.camxes.2011"
lojban = "i la alis cu lebna le bifpra e lei gluta gi'e co'a pilno by mu'i le nu le kumfa cu glare kei ze'a le nu ca'o cusku lu oi ue roda cizra ca le cabdei i ca le purlamdei roda fadni fasnu i mi kucli le du'u xukau da galfi mi ca le nicte i ei mi pensi i xu mi mi mintu ca le nu mi cikna binxo ca le zi cerni i pe'iru'e ba'anai mi cinmo le nu mi frica milxe i ku'i va'o le nu mi mi na mintu cu jersi preti fa le du'u mi du makau i la'e di'u cu barda nabmi li'u i abu co'a pensi ro le verba poi ke'a abu slabu gi'e mintu le ka nanca ku'o tezu'e le nu jdice le du'u xukau cumki fa le nu ba'o galfi abuboi su'oboi vy "

