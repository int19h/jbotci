id = "corpus.camxes.2202"
lojban = " i abu pu mitre lo drani jibni zu lo tai mutce ja'e le nu cizra ca le cfari i ku'i abu se tcaci binxo ze'a lo mentu be li so'u gi'e di'a ta'e sezytavla i lu uo le xadba be le mi selpla ba'o se zukte i u'e lei bu'u nuncenba cu cizra i mi noroi birti le du'u mi ba binxo makau zi lo mentu i ku'i mi ba'o xruti le ka drani mitre icaku ei nerkla le melbi purdi i a'u ta'i ma zukte la'e di'u li'u i abu ca le nu cusku di'u cu suksa tolcliva lo klina noi vasru lo cmalu zdani noi mitre li ji'ipa i lu romu'ei le du'u makau xabju ta kei sei la alis pensi na drani fa le nu mi tolcanci tai le nu mi ca mitre i va'oku mi terpygau mutce li'u i seki'ubo abu co'a za'ure'u citka le pritu spisa gi'e na darsi le nu jbikla le zdani kei pu le nu ba'o jdika ja'e le nu cenmitre li reno "

