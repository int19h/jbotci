brackets = "(.i me la blábi ráctu noĭ másno bájra xrúti gi'e xánka ke srúri cátlu ca le nu kláma keĭ taĭ le nu ry da pu círko .i [.a bu] tírna le nu ry láŭble sézysku lu .oĭ la noltroní'u .i .oĭ la noltroní'u doĭ dírba xánce be mi doĭ skápi be mi doĭ zbíkre be mi zo'u ny da mi ba catrymí'e ju'o saĭ .i jo ro mabrnfúru cu mabrnfúru .i mi ko'a ma fálcru li'u .i la .alis. zi smádi le du'u ry sísku le bífpra .e le blábi ke kánba glúta re meĭ .i [.a bu] noĭ xéndo cu co'a sísku ko'a .i ku'i ko'a na se víska .i ro da símlu le ka ba'o cénba keĭ ba le nu [.a bu] límna le lálxu .i le bárda kúmfa poĭ vásru le bláci júbme .e le cmálu vórme cu ba'o múlno cánci)"
