id = "corpus.camxes.2080"
lojban = " i le di'u se cusku cu se jalge lo banli nu cinmo savru ra'i lei zvati i lo cipni cu sutra le nu cliva ibo pa tolci'o cipnrpika co'a cliva brebi'o gi'ecabo cusku lu eije'u mi zdakla i le nicte vacri na mapti le galxe be mi li'u ije lo cipnrkanario cu nalsto voksa kixsku fi lei panzi fe lu ko klama doi dirba i je'u ca tcika le nu ro do cu sipna bu'u le ckana li'u i ki'u loi vrici le romei cu cliva ije la alis cu bazi kansa no da "

