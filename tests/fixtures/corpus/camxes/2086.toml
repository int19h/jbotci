id = "corpus.camxes.2086"
lojban = " i caku abu zvati lo cnici ke cmalu kumfa noi lo jubme cu lamji le canko be ke'a gi'e se cpana to du'i le abu se pacna toi lo bifpra e ji'ici cmatce ke blabi ke kanba gluta remei i abu lebna le bifpra e pa le gluta remei gi'e pu'o cliva le kumfa ca le nu catlu fa'a lo cmalu botpi noi sanli le jibni be le minra i ca le ca krefu noda by tcita fi'o jufra lu ko mi pinxe li'u i ku'i abu gacri vimcu gi'e punji by le abu ctebi i lu ju'o ca ro nu mi pinxe ja citka da kei sei abu sezysku ba'e de poi cinri cu fasnu iseki'ubo mi ba zgana le nu le vi botpi makau gasnu i a'o ti gasnu le nu mi za'ure'u banro lo barda i mi mutce le ka tatpi le nu tai cmatce li'u"

