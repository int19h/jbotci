id = "corpus.camxes.2031"
lojban = " i le pamoi co preti cu li'a du'u ta'i makau za'ure'u sudga i casnu la'edi'u ibabo zi lo mentu be li so'u cu simlu le ka rarna kei fa le nu la alis ca'o pendo tavla le romei tai le nu da'i abu se slabu ra ze'a le nu abu jmive i je'u abu pu ze'u daupro la cipnrlori noi uo badri carna gi'e cusku lu mi do tolcitmau gi'eja'ebo junmau li'u po'o i la'e di'u zo'u la alis na curmi secau le nu djuno le du'u ly nanca makau i ki'u le nu la cipnrlori cu je'a tolsarxe le nu cusku le du'u ly makau nanca cu na se sumji se cusku"

