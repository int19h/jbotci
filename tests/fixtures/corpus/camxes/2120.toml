id = "corpus.camxes.2120"
lojban = " i abu ja'aru'e sanji le nu abu lo cmalu grana cu lafti gi'e jarco le gerpanzi ija'ebo le gerpanzi cu plipe le vacri ro le jamfu gi'e se pluka cmoni gi'e sezre'o le garna gi'e gasnu le nu simlu le ka gunta ri ibabo la alis rivbi le nu janli kei le nu muvdu le trixe be lo barda cpinyspa i ca le nu abu tolcanci le drata mlana kei le gerpanzi za'ure'u sezre'o le grana gi'e gunro farlu seja'e le nu sutra troci le nu jgari gy ibabo la alis noi jinvi le du'u simsa lo'e nu kelci lo braxirma zi'e noi terpa lo'e nu se stapa fi le gy jamfu cu za'ure'u bajra fa'ati'a le cpinyspa i le gerpanzi co'a so'oroi ze'i gunta le grana gi'e ve'ifa'a je ve'uto'o bajra gi'e roroi rufsu bacru gi'e romai vu zutse gi'e ta'irva'u gi'e se tance le dandu be le moklu gi'e se kanla lei xadba ganlo"

