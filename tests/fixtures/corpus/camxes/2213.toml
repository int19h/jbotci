id = "corpus.camxes.2213"
lojban = " i lu le nu do darxi cu racli sei la selfu secau le nu jundi abu kei di'a co'e va'o le nu da'i mi do sepli le vorme i mu'a va'o le nu da'i do nenri kei ge do darxi gi mi curmi le nu do barkla li'u i sy catlu le tsani ze'a le nu tavla i la alis jinvi le du'u ju'osai sy tolclite la'e di'u i lu ku'i ju'ocu'i ta na kakne co rivbi la'e di'u sei abu sezysku i lei ta kanla tai jibni le gapru be le stedu iseju ei ta spuda lo'e preti i mi nerkla ta'i ma sei abu cladu ke krefu cusku li'u "

