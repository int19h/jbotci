lojban = " i ze'a lo mentu abu sanli gi'e catlu le zdani gi'e pensi le du'u ei bazi zukte makau icabo lo selfu poi dasni le manfyta'u cu bajra cliva le ricmei to abu jinvi le du'u sy selfu kei fo le nu sy dasni lo manfyta'u i abu va'o da'i na'e bo la'e di'u ca le po'o nu viska le flira cu te cmene sy zo finpe toi gi'e cladu darxi le vorme le degycidni i vy karbi'o gau lo drata manfyta'u dasni selfu noi se flira lo cukla gi'e se kanla lo barda tai tu'a lo'e plipybanfi i le re selfu sei la alis sanji zo'u le kerfa cu pumvau gi'e cukla gacri piro le stedu i abu mutce co kucli le du'u srana makau kei"

