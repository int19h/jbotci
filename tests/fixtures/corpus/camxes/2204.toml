brackets = "(.i ze'a lo méntu [.a bu] sánli gi'e cátlu le zdáni gi'e pénsi le du'u .eĭ ba zi zúkte ma kaŭ .i ca bo lo sélfu poĭ dásni le manfytá'u cu bájra clíva le rícmeĭ to [.a bu] jínvi le du'u sy sélfu keĭ fo le nu sy dásni lo manfytá'u .i [.a bu] va'o da'i na'e bo la'e di'u ca le po'o nu víska le flíra cu te cméne sy [zo fínpe] toĭ gi'e cládu dárxi le vórme le degycídni .i vy karbí'o gaŭ lo dráta manfytá'u dásni sélfu noĭ se flíra lo cúkla gi'e se kánla lo bárda taĭ tu'a lo'e plipybánfi .i le re sélfu seĭ la .alis. sánji zo'u le kérfa cu púmvaŭ gi'e cúkla gácri pi ro le stédu .i [.a bu] mútce co kúcli le du'u srána ma kaŭ keĭ)"
