id = "corpus.camxes.2010"
lojban = "i bazaku abu tirna lo nu cmalu stapa le darno kei gi'e sutra le nu sudgau lei kanla tezu'e le nu viska le nu makau klama i klama fa la blabi ractu noi xruti gi'e melbi dasni gi'e jgari lo blabi ke kanba gluta remei ku fa'u lo barda bifpra le re xance i ry sutra bajra klama gi'e sezysku lu oi la noltroni'u zo'u ba'a ny ba cilce fengu va'o le nu mi gasnu le nu ny denpa li'u i la alis tai cinmo le nu tolpacna kei ja'e le nu bredi le nu cpedu lo'e nunsidju makau iseki'ubo abu ca le nu la ractu cu jibni cu co'a cusku sepi'o lo lauble je toldarsi voksa lu pe'u doi ractu li'u i la ractu cu suksa se jenca gi'e falcru lei blabi ke kanba gluta e le bifpra gi'e bajra mo'ine'i le manku serai le ka sutra "

