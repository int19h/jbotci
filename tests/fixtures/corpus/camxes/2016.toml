id = "corpus.camxes.2016"
lojban = " i abu ca le nu cusku di'u cu fa'ani'a catlu le abu xance gi'e se spaji le nu viska le nu abu pu co'a dasni pa le cmalu ke blabi ke kanba gluta pe la ractu ze'a le nu tavla i lu mi kakne ti ma sei abu pensi i ja'o mi za'ure'u jdika le ka barda li'u i abu sa'irbi'o gi'e klama le jubme tezu'e le nu sezmerli fi jy i facki le du'u ca centre li ji'imuno gi'e sutra le nu ca'o jdika i bazi facki le du'u rinka la'e di'u fa le nu jgari le bifpra i sutra falcru by puzi le nu mu'osai jdika"

