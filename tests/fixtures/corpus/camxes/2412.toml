lojban = " i la mum e la zel cusku noda gi'e catlu la rel i la rel co'a kandi voksa cusku lu je'u sa'u doi citni'u ei ti ba'e xunre rozgu tricu i mi'a pu srera le nu sombo lo blabi i ro mi'a romu'ei le du'u la noltruni'u cu facki la'e di'u cu ba katna te vimcu le stedu i to'u sa'u doi citni'u mi'a zukte le mi'a xagrai pu le nu ny klama li'u i caku la mum noi pu ca'o xanka catlu le purdi cu krixa lu la noltruni'u i la noltruni'u li'u i le ci purdykurji cu sezre'o ja'e le nu le flira cu cpana le loldi i sance so'i nu stapa i la alis sruri catlu gi'e djica lo'e nu viska la noltruni'u (mu'ei)"

