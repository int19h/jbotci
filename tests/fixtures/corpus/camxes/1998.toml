id = "corpus.camxes.1998"
lojban = " i bazaku abu ca le nu facki le du'u no drata cu fasnu cu jdice le nu zi klama le purdi i ku'i la alis uu ca le nu tolcliva le vorme cu facki le du'u abu tolmorji tu'a le cmalu ke solji ckiku i ca le nu ba'o xruti le jubme tezu'e le nu cpacu cy cu facki le du'u le ni abu galtu cu na banzu le nu cpacu cy i abu traji troci le nu cpare pa le tuple be le jubme i ku'i ty dukse le ka se sakli i abu uu ca le nu tatpi le nu troci cu zutse gi'e klaku "

