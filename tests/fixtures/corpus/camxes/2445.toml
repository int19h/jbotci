id = "corpus.camxes.2445"
lojban = " i le ralju be lei nandu be la alis ca le cfari cu nu jitro le fagycpi i abu snada le nu kufra banzu punji le fy xadni noi le tuple cu dandu ku'o le cnita be le abu birka i ku'i ta'eku fy ca le nu ge le cnebo mo'u sirji gi abu bredi le nu darxi le jesymabru le fy stedu cu torni gi'e catlu fa'a le abu flira gi'e se cfipu frumu ja'e le nu abu ka'enai rivbi le nu spoja cmila i ca le nu abu ba'o punji le fy stedu le dizlo gi'e pu'o za'ure'u co'a co'e cu xajmi mutce fa le nu facki le du'u le jesymabru pu nalbolbi'o gi'e ca'o klama lo darno i ji'a ta'eku lo cmana a lo skuro cu zunti ca le nu abu djica le nu benji le jesymabru i la alis ki'u le nu le korcu sonci roroi sa'irgau gi'e dzukla lo drata pagbu be le foldi cu jivbi'o le du'u le nunkei ja'a mutce le ka nandu "

