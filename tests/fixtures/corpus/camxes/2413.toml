brackets = "(.i kláma pa moĭ fa pa no sónci noĭ bévri loĭ grána .i sy míntu le purdykúrji le ka ma kaŭ tármi ce'u .i cláni kúrfa gi'e plíta gi'e se kójna lo'e xánce .e lo'e jámfu .i jérsi fa leĭ pa no nolkánsa noĭ rícfu se jádni loĭ tábjme gi'e re meĭ cádzu du'i tu'a leĭ sónci .i jérsi fa leĭ nóltru pánzi noĭ pa no meĭ .i leĭ cmálu dírba cu gléki plípe kláma co xánce jgári re meĭ .i ro boĭ py se jádni loĭ rísna .i jérsi fa leĭ vítke .i so'e boĭ vy noltrúnaŭ ja noltruní'u .i la .alis. fakyví'a la blábi ráctu noĭ jbíni vy .i ry sútra je xánka távla gi'e císma fráti ro se cúsku gi'e zo'a kláma se caŭ lo'e nu sánji [.a bu] .i jérsi fa la rísna nolsé'u noĭ bévri le noltrúnaŭ mápku se pi'o lo zirxú'e ranbú'u kícne .i ro moĭ le bánli dzúpoĭ fa ba'e le rísna ke nóltru re meĭ)"
