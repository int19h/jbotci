id = "corpus.camxes.1993"
lojban = "i ru'adai na prali fa le nu denpa fi tu'a le cmalu vorme iseki'ubo abu xruti le jubme gi'e xadba pacna le nu facki le du'u lo drata ckiku jy cpana kei a do'anai tu'a lo cukta co javni be le nu ta'i makau polje lo prenu tai tu'a lo'e darvistci i ca le ca krefu abu facki le du'u cpana jy fa lo cmalu botpi to lu noi ju'o pu na zvati ti sei la alis cusku li'u toi i sruri le botpi cnebo fa lo pelji tcita noi lei valsi po'u lu ko mi pinxe li'u cu melbi prina ke'a sepi'o loi barda lerfu "

