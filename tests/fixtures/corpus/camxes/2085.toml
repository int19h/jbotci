id = "corpus.camxes.2085"
lojban = " i lu ua cizra sei la alis sezysku fa le nu mi selfu lo ractu i ru'a za'umai la dinas mi ba minde li'u i abu co'a se xanri loi klesi be lei cuntu be'o poi da'i fasnu i lu doi nix alis ko ca klama ti gi'e bredi le nu cadzu li'u i lu mi bazi klama doi kurji i ku'i ei mi jundi le vi kevna gi'e fanta le nu le smacu cu barkla li'u i lu ku'i ianai curmi sei la alis di'a co'e le nu la dinas cu stali le zdani va'o le nu dy co'a tai minde lei prenu li'u"

