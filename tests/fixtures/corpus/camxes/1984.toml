brackets = "(.i ga le jintyké'a cu mútce le ka cóndi gi [.a bu] mútce le ka másno le nu fárlu .i ni'i bo le témci cu mútce bánzu ca le nu fárlu keĭ le nu cátlu le srúri gi'e kúcli le du'u ma kaŭ ba zi fásnu .i pa maĭ [.a bu] tróci le nu cátlu le cníta gi'e fácki le du'u [.a bu] ma kaŭ kláma .i ku'i dúkse le ka mánku keĭ le nu ka'e víska .i re maĭ [.a bu] cátlu leĭ mlána be le jintyké'a gi'e fácki le du'u my cúlno loĭ se kájna tánxe ku joĭ loĭ cúkta kájna .i [.a bu] víska loĭ cártu ku joĭ loĭ píxra vu'o noĭ dándu loĭ génxu .i [.a bu] lébna lo bótpi pa le kájna ca le nu lampágre .i by se tcíta lu najnímre títyjdu li'u gi'e ku'i .u'a naĭ daĭ kúnti .i [.a bu] na'e djíca le nu fálcru le bótpi keĭ mu'i le nu térpa le nu cátra da .i se ki'u bo [.a bu] súksa le nu púnji by pa le se kájna tánxe ca le nu [.a bu] ty fárlu lampágre)"
