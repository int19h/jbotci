brackets = "(.i la .alis. kárgaŭ le vrógaĭ gi'e fácki le du'u vy se jérsi lo cmálu vórme noĭ na brámaŭ lo rátcu kévna .i [.a bu] cídni sánli gi'e cátlu le se vórme noĭ tráji le ka mélbi keĭ leĭ púrdi poĭ su'o roĭ se víska .i .a'o saĭ daĭ [.a bu] bárkla le mánku kúmfa gi'e cádzu jbíni leĭ va zdáni be loĭ cármi xrúla be'o ku joĭ leĭ va lénku jínto .i ku'i [.a bu] na ka'e grégaŭ le ji'a saĭ stédu le vórme .i lu va'o ji'a saĭ le nu le mi stédu ka'e págre keĭ seĭ la .alis. .ŭu pénsi sy tolmútce le ka se pílno se caŭ leĭ mi jánco .i .aŭ mi ka'e se pólje taĭ tu'a lo'e darvístci .i pe'i mi ka'e go'i va'o le nu mi djúno le du'u mi co'a go'i ta'i ma kaŭ li'u .i leĭ pu zi nalfádni fásnu taĭ so'i meĭ ja'e le nu la .alis. co'a jínvi le du'u so'u saĭ da ca'a nalcúmki)"
