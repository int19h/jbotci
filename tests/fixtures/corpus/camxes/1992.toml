id = "corpus.camxes.1992"
lojban = "i la alis kargau le vrogai gi'e facki le du'u vy se jersi lo cmalu vorme noi na bramau lo ratcu kevna i abu cidni sanli gi'e catlu le se vorme noi traji le ka melbi kei lei purdi poi su'oroi se viska i a'osaidai abu barkla le manku kumfa gi'e cadzu jbini lei va zdani be loi carmi xrula be'o ku joi lei va lenku jinto i ku'i abu na ka'e gregau le ji'asai stedu le vorme i lu va'o ji'asai le nu le mi stedu ka'e pagre kei sei la alis uu pensi sy tolmutce le ka se pilno secau lei mi janco i au mi ka'e se polje tai tu'a lo'e darvistci i pe'i mi ka'e go'i va'o le nu mi djuno le du'u mi co'a go'i ta'i makau li'u i lei puzi nalfadni fasnu tai so'imei ja'e le nu la alis co'a jinvi le du'u so'usai da ca'a nalcumki "

