brackets = "(.i ca ku [.a bu] boĭ za'u re'u co'a co'e .i lu mi kúcli le du'u xu kaŭ mi ba fárlu ba'e págre le térdi .i .u'i saĭ tolcánci le jbíni be leĭ prénu poĭ cádzu faŭ le nu le stédu cu cníta .i pe'i bu'u le smudúkti to sa'a ca ku [.a bu] gléki le nu no da tírna keĭ ki'u le nu le válsi na saĭ dráni sánce toĭ .i ku'i .eĭ mi te préti le gúgde le du'u ma kaŭ cméne .i lu pe'u doĭ nínmu ti núzlo gi'i srálo to sa'a [.a bu] tróci le nu krorínsa keĭ ca le nu távla .i ko se xánri le nu krorínsa ca le nu fárlu .i pe'i peĭ do ka'e snáda toĭ .i ny ba jínvi le du'u mi toldjúno ke cmálu níxli keĭ fo le nu mi te préti .i .eĭ mi na te préti .i ju'o cu'i mi víska le nu ba'o císka le cméne da li'u)"
