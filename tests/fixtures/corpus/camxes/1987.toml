id = "corpus.camxes.1987"
lojban = "i caku abuboi za'ure'u co'a co'e i lu mi kucli le du'u xukau mi ba farlu ba'e pagre le terdi i u'isai tolcanci le jbini be lei prenu poi cadzu fau le nu le stedu cu cnita i pe'i bu'u le smudukti tosa'a caku abu gleki le nu noda tirna kei ki'u le nu le valsi nasai drani sance toi i ku'i ei mi te preti le gugde le du'u makau cmene i lu pe'u doi ninmu ti nuzlo gi'i sralo tosa'a abu troci le nu krorinsa kei ca le nu tavla i ko se xanri le nu krorinsa ca le nu farlu i pe'ipei do ka'e snada toi i ny ba jinvi le du'u mi toldjuno ke cmalu nixli kei fo le nu mi te preti i ei mi na te preti i ju'ocu'i mi viska le nu ba'o ciska le cmene da li'u "

