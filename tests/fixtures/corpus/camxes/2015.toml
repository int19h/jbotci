id = "corpus.camxes.2015"
lojban = "i lu ju'o lei valsi na drani sei la alis uu cusku li'u i lei abu kanla cu za'ure'u tisna loi se klaku ca le nu di'a cusku lu ja'o mi du la mabel i mi ba bilga le nu xabju le pindi ke cmalu zdani gi'e ponse ji'ino selkei gi'e oi cilre so'isai da i ai na go'i i mi mu'o jdice le du'u mi ganai du la mabel gi stali ti i noda ba prali lei bartu prenu le nu py setca le stedu ti gi'e cusku lu ko barkla doi dirba li'u i mi ba fa'aga'u catlu gi'e cusku lu pau mi du ma i pamai ko mi jungau la'e di'u ibabo mi va'o le nu nelci le nu du makau cu barkla i va'o le nu na nelci cu denpa ti le nu mi drata li'u i ku'i oi sei la alis suksa klaku krica i au su'o da ca'a setca le stedu ti i mi tai titpa le nu mi ti nonkansa li'u"

