<svg xmlns="http://www.w3.org/2000/svg" viewBox="-160 -10 460 230" width="100%" height="100%">
          <!-- 
            "jbotci" App Logo
            Based on the Lojban logo geometry.
            Radius = 60, Stroke width = 10, Uniform 20-unit letter spacing
          -->
          
          <!-- Black letters: j, b, i -->
          <g fill="none" stroke="black" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
            
            <!-- j: stem with a hook (arcs left) -->
            <path d="M -110, 40 V 170 A 30,30 0 0,1 -140, 200" />
            
            <!-- b: vertical stem and circular bowl -->
            <path d="M -90, 20 V 160" />
            <circle cx="-30" cy="100" r="60" />
            
            <!-- i: vertical stem -->
            <path d="M 252.4, 40 V 160" />

          </g>
          
          <!-- Dots (tittles) for j and i -->
          <g fill="black">
            <circle cx="-110" cy="20" r="5" />
            <circle cx="252.4" cy="20" r="5" />
          </g>

          <!-- Lojban logo forming the letters "o", "t", and "c" -->
          <g fill="none" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
            
            <!-- o: The left circle -->
            <circle cx="110" cy="100" r="60" stroke="blue" />
            
            <!-- c: The right circle, mathematically cut from -45 to 45 degrees -->
            <path stroke="blue" d="M 232.426,57.574 A 60,60 0 1,0 232.426,142.426" />
            
            <!-- t: The red cross, now with a bottom that curls right to mirror the 'j' -->
            <path stroke="red" d="M 30,100 H 270 M 150,20 V 170 A 30,30 0 0,0 180,200" />
            
          </g>

          <!-- The red arrows completing the Lojban cross (Bottom arrow removed) -->
          <path fill="red" d="m40,85-6,15 6,15-24-15zm220,0 6,15-6,15 24-15zM135,30l15-6 15,6-15-24z"/>

        </svg>