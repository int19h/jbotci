[package]
name = "jbotci-web"
description = "Dioxus web client for jbotci."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[features]
expensive_contracts = []

[[bin]]
name = "jbotci-web"
path = "src/main.rs"

[dependencies]
bityzba.workspace = true
dioxus = { workspace = true, features = ["web"] }
jbotci-cll.workspace = true
jbotci-diagnostics.workspace = true
jbotci-output.workspace = true
jbotci-web-core.workspace = true
serde_json.workspace = true
wasm-bindgen.workspace = true
web-sys = { workspace = true, features = [
    "CssStyleDeclaration",
    "Document",
    "DomRect",
    "DragEvent",
    "Element",
    "History",
    "HtmlElement",
    "HtmlInputElement",
    "Location",
    "Node",
    "NodeList",
    "Storage",
    "Window",
] }

[build-dependencies]
bityzba = { workspace = true, features = ["contract_scanner"] }

[lints]
workspace = true
