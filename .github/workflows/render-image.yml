name: Render image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: render-image-${{ github.ref }}
  cancel-in-progress: true

env:
  DIOXUS_CLI_VERSION: 0.7.9
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  WEB_EMBEDDINGS_BASE_URL: https://assets.jbotci.app/embeddings/web/v1

jobs:
  build-bundle:
    name: Build Dioxus server bundle
    runs-on: ubuntu-latest
    container:
      image: rust:1-bookworm
    env:
      CARGO_HOME: ${{ github.workspace }}/.github-cache/cargo
      CARGO_TARGET_DIR: ${{ github.workspace }}/.github-cache/cargo-target/deploy
      DIOXUS_HOME: ${{ github.workspace }}/.github-cache/home
      DIOXUS_CLI_ROOT: ${{ github.workspace }}/.github-cache/dioxus-cli/0.7.9
      DIOXUS_CLI_TARGET_DIR: ${{ github.workspace }}/.github-cache/cargo-target/dioxus-cli-0.7.9
      CARGO_BUILD_JOBS: 4
      RUSTUP_HOME: /usr/local/rustup
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl file git nodejs npm zstd
          rm -rf /var/lib/apt/lists/*

      - name: Check out source
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Restore build cache
        id: build-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .github-cache/cargo
            .github-cache/cargo-target/deploy
            .github-cache/cargo-target/dioxus-cli-${{ env.DIOXUS_CLI_VERSION }}
            .github-cache/dioxus-cli/${{ env.DIOXUS_CLI_VERSION }}
            .github-cache/home/.dx
          key: jbotci-render-${{ runner.os }}-${{ env.DIOXUS_CLI_VERSION }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            jbotci-render-${{ runner.os }}-${{ env.DIOXUS_CLI_VERSION }}-${{ github.ref_name }}-
            jbotci-render-${{ runner.os }}-${{ env.DIOXUS_CLI_VERSION }}-

      - name: Install Rust wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install Dioxus CLI
        run: |
          set -eux
          mkdir -p "${DIOXUS_HOME}" "${DIOXUS_CLI_ROOT}" "${DIOXUS_CLI_TARGET_DIR}"
          if ! "${DIOXUS_CLI_ROOT}/bin/dx" --version | grep -Eq "^dioxus ${DIOXUS_CLI_VERSION}( |$)"; then
            CARGO_TARGET_DIR="${DIOXUS_CLI_TARGET_DIR}" \
              cargo install dioxus-cli \
                --version "${DIOXUS_CLI_VERSION}" \
                --locked \
                --root "${DIOXUS_CLI_ROOT}" \
                --force
          fi
          "${DIOXUS_CLI_ROOT}/bin/dx" --version

      - name: Build deployment bundle
        env:
          HOME: ${{ env.DIOXUS_HOME }}
          JBOTCI_GIT_COMMIT: ${{ github.sha }}
          JBOTCI_WEB_EMBEDDINGS_BASE_URL: ${{ env.WEB_EMBEDDINGS_BASE_URL }}
        run: |
          set -eux
          export PATH="${DIOXUS_CLI_ROOT}/bin:${PATH}"
          cargo xtask dist-server \
            --out-dir .jbotci-build/render \
            --base-path / \
            --skip-web-embeddings
          test -x .jbotci-build/render/server
          test -f .jbotci-build/render/public/index.html
          file .jbotci-build/render/server

      - name: Smoke test bundle
        env:
          DIOXUS_ASSET_ROOT: /
          DIOXUS_PUBLIC_PATH: ${{ github.workspace }}/.jbotci-build/render/public
          IP: 127.0.0.1
          PORT: 10000
        run: |
          set -eux
          .jbotci-build/render/server &
          server_pid="$!"
          trap 'kill "${server_pid}" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:10000/api/health; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Archive deployment bundle
        run: |
          set -eux
          tar -C .jbotci-build/render -czf .jbotci-build/render-bundle.tar.gz server public

      - name: Upload deployment bundle
        uses: actions/upload-artifact@v6
        with:
          name: render-bundle
          path: .jbotci-build/render-bundle.tar.gz
          if-no-files-found: error
          retention-days: 7

      - name: Save build cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            .github-cache/cargo
            .github-cache/cargo-target/deploy
            .github-cache/cargo-target/dioxus-cli-${{ env.DIOXUS_CLI_VERSION }}
            .github-cache/dioxus-cli/${{ env.DIOXUS_CLI_VERSION }}
            .github-cache/home/.dx
          key: ${{ steps.build-cache.outputs.cache-primary-key }}

  publish-image:
    name: Publish GHCR runtime image
    runs-on: ubuntu-latest
    needs: build-bundle
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Download deployment bundle
        uses: actions/download-artifact@v7
        with:
          name: render-bundle
          path: .jbotci-build

      - name: Prepare runtime image context
        run: |
          set -eux
          mkdir -p .jbotci-build/render
          tar -xzf .jbotci-build/render-bundle.tar.gz -C .jbotci-build/render
          test -x .jbotci-build/render/server
          test -f .jbotci-build/render/public/index.html

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=manual-${{ github.run_number }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=jbotci
            org.opencontainers.image.description=Lojban tool web server
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .jbotci-build/render
          file: deploy/render/Dockerfile.runtime
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            VCS_REF=${{ github.sha }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}

      - name: Smoke test pushed image
        run: |
          set -eux
          image="${IMAGE_NAME}:sha-${GITHUB_SHA}"
          docker pull "${image}"
          container_id="$(docker run -d --rm -p 127.0.0.1:8080:10000 "${image}")"
          trap 'docker stop "${container_id}" >/dev/null 2>&1 || true' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs "${container_id}"
          exit 1

      - name: Summarize image
        run: |
          {
            echo "### Published image"
            echo
            echo "- \`${IMAGE_NAME}:sha-${GITHUB_SHA}\`"
            echo "- \`${IMAGE_NAME}:manual-${GITHUB_RUN_NUMBER}\`"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "- \`${IMAGE_NAME}:main\`"
            fi
            echo "- digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
