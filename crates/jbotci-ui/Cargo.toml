[package]
name = "jbotci-ui"
description = "Shared Dioxus UI for jbotci web, desktop, and future mobile apps."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = false

[features]
expensive_contracts = []
web = ["dioxus/web"]
desktop = [
    "dioxus/desktop",
    "dep:arboard",
    "dep:jbotci-embeddings",
    "dep:rfd",
    "jbotci-embeddings/native-llama",
]
mobile = ["dioxus/mobile"]

[dependencies]
arboard = { workspace = true, optional = true }
bityzba.workspace = true
dioxus = { workspace = true, default-features = false, features = ["lib", "launch", "router"] }
directories.workspace = true
fancy-regex.workspace = true
futures-channel.workspace = true
jbotci-cll.workspace = true
jbotci-dialect.workspace = true
jbotci-diagnostics.workspace = true
jbotci-embeddings = { workspace = true, optional = true }
jbotci-gentufa.workspace = true
jbotci-output.workspace = true
jbotci-web-core.workspace = true
rfd = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
unicode-normalization.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
bytemuck.workspace = true
js-sys.workspace = true
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
web-sys = { workspace = true, features = [
    "Blob",
    "BlobPropertyBag",
    "CssStyleDeclaration",
    "Document",
    "DomRect",
    "DragEvent",
    "Event",
    "EventTarget",
    "Element",
    "History",
    "HtmlElement",
    "HtmlAnchorElement",
    "HtmlInputElement",
    "HtmlTextAreaElement",
    "Location",
    "MouseEvent",
    "Node",
    "NodeList",
    "Response",
    "Storage",
    "Url",
    "Window",
] }
wgpu.workspace = true

[build-dependencies]
bityzba = { workspace = true, features = ["contract_scanner"] }

[lints]
workspace = true
